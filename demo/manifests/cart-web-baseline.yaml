apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cart-web
  namespace: ls-pricing-cloudops-test
  labels:
    app: cart-web
    version: v1-healthy
  annotations:
    kubernetes.io/change-cause: "baseline — healthy statefulset (nginx:1.25-alpine, 500m CPU, 256Mi)"
spec:
  serviceName: cart-web
  replicas: 3
  selector:
    matchLabels:
      app: cart-web
  template:
    metadata:
      labels:
        app: cart-web
    spec:
      containers:
        - name: cart-web
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cart-web
  namespace: ls-pricing-cloudops-test
spec:
  clusterIP: None
  selector:
    app: cart-web
  ports:
    - port: 80
      targetPort: 80
