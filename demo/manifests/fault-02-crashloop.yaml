# Test 2: CrashLoopBackOff — bad entrypoint exits immediately → rollback
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cart-web
  namespace: ls-pricing-cloudops-test
  labels:
    app: cart-web
    version: fault-crashloop
  annotations:
    kubernetes.io/change-cause: "FAULT: busybox crash loop (exit 1)"
spec:
  serviceName: cart-web
  replicas: 3
  selector:
    matchLabels:
      app: cart-web
  template:
    metadata:
      labels:
        app: cart-web
    spec:
      containers:
        - name: cart-web
          image: busybox:1.36
          command: ["/bin/sh", "-c", "echo 'FATAL: missing config /etc/app/config.yaml' && exit 1"]
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
