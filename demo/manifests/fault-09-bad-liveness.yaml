# Test 9: Wrong liveness probe path → container keeps restarting → rollback
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cart-web
  namespace: ls-pricing-cloudops-test
  labels:
    app: cart-web
    version: fault-bad-liveness
  annotations:
    kubernetes.io/change-cause: "FAULT: liveness probe path /healthz/nonexistent (404)"
spec:
  serviceName: cart-web
  replicas: 3
  selector:
    matchLabels:
      app: cart-web
  template:
    metadata:
      labels:
        app: cart-web
    spec:
      containers:
        - name: cart-web
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /healthz/nonexistent
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 3
            failureThreshold: 2
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 3
