# Test 19: Slow startup — initialDelaySeconds too short for readiness probe
# Container is healthy but takes time to start, probe kills it → restart loop
# Expected: rollback
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cart-web
  namespace: ls-pricing-cloudops-test
  labels:
    app: cart-web
    version: fault-slow-startup
  annotations:
    kubernetes.io/change-cause: "FAULT: aggressive readiness probe (1s initial, 1s period, 1 threshold)"
spec:
  serviceName: cart-web
  replicas: 3
  selector:
    matchLabels:
      app: cart-web
  template:
    metadata:
      labels:
        app: cart-web
    spec:
      containers:
        - name: cart-web
          image: nginx:1.25-alpine
          command: ["sh", "-c", "sleep 15 && nginx -g 'daemon off;'"]
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 1
            periodSeconds: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 2
            failureThreshold: 3
