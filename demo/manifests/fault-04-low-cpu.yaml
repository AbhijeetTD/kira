# Test 4: Undersized CPU — 1m CPU limit (extreme throttling) → patch CPU
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cart-web
  namespace: ls-pricing-cloudops-test
  labels:
    app: cart-web
    version: fault-low-cpu
  annotations:
    kubernetes.io/change-cause: "FAULT: 1m CPU limit — extreme throttling"
spec:
  serviceName: cart-web
  replicas: 3
  selector:
    matchLabels:
      app: cart-web
  template:
    metadata:
      labels:
        app: cart-web
    spec:
      containers:
        - name: cart-web
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "1m"
              memory: "128Mi"
            limits:
              cpu: "1m"
              memory: "256Mi"
