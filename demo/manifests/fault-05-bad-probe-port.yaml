# Test 5: Wrong Readiness Probe Port — app listens on 80 but probe checks 9999 → rollback
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cart-web
  namespace: ls-pricing-cloudops-test
  labels:
    app: cart-web
    version: fault-bad-probe
  annotations:
    kubernetes.io/change-cause: "FAULT: readiness probe on port 9999 (app listens on 80)"
spec:
  serviceName: cart-web
  replicas: 3
  selector:
    matchLabels:
      app: cart-web
  template:
    metadata:
      labels:
        app: cart-web
    spec:
      containers:
        - name: cart-web
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 9999
            initialDelaySeconds: 1
            periodSeconds: 2
            failureThreshold: 3
