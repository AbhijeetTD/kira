# ── cart (StatefulSet, 3 containers: cart + fluent-bit + redis-cache) ──────
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cart
  namespace: ls-pricing-cloudops-test
  labels:
    app: cart
    component: pricing
    tier: engine
    version: "2025.10.0.17"
  annotations:
    kubernetes.io/change-cause: "v2025.10.0.17 — pricing cart engine"
spec:
  serviceName: cart
  replicas: 1
  selector:
    matchLabels:
      app: cart
  template:
    metadata:
      labels:
        app: cart
        component: pricing
        tier: engine
    spec:
      containers:
        - name: cart
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          resources:
            requests: { cpu: "10m", memory: "64Mi" }
            limits:   { cpu: "100m", memory: "128Mi" }
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 10
        - name: fluent-bit
          image: busybox:1.36
          command: ["sh", "-c", "echo 'fluent-bit log forwarder started' && sleep infinity"]
          resources:
            requests: { cpu: "2m", memory: "16Mi" }
            limits:   { cpu: "10m", memory: "32Mi" }
        - name: redis-cache
          image: busybox:1.36
          command: ["sh", "-c", "echo 'redis sidecar cache started' && sleep infinity"]
          resources:
            requests: { cpu: "5m", memory: "32Mi" }
            limits:   { cpu: "20m", memory: "64Mi" }
---
apiVersion: v1
kind: Service
metadata:
  name: cart
  namespace: ls-pricing-cloudops-test
spec:
  clusterIP: None
  selector:
    app: cart
  ports:
    - port: 80
      targetPort: 80
