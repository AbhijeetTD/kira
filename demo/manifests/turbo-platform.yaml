# ── dataintegrationservice-api (2 containers: api + fluent-bit) ─────────────
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dataintegrationservice-api
  namespace: ls-data-cloudops-test
  labels:
    app: dataintegrationservice-api
    component: dis
    tier: api
    version: "2022.8.3.20"
  annotations:
    kubernetes.io/change-cause: "v2022.8.3.20 — data integration API"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dataintegrationservice-api
  template:
    metadata:
      labels:
        app: dataintegrationservice-api
        component: dis
        tier: api
    spec:
      containers:
        - name: dataintegrationservice-api
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          resources:
            requests: { cpu: "5m", memory: "32Mi" }
            limits:   { cpu: "50m", memory: "64Mi" }
          readinessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 3
            periodSeconds: 10
        - name: fluent-bit
          image: busybox:1.36
          command: ["sh", "-c", "echo 'fluent-bit sidecar started' && sleep infinity"]
          resources:
            requests: { cpu: "2m", memory: "16Mi" }
            limits:   { cpu: "10m", memory: "32Mi" }

