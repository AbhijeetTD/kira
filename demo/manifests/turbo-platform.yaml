# ═══════════════════════════════════════════════════════════════════════════════
# Namespaces
# ═══════════════════════════════════════════════════════════════════════════════
---
apiVersion: v1
kind: Namespace
metadata:
  name: ls-pricing-cloudops-test
  labels:
    platform: turbo
    tier: pricing
---
apiVersion: v1
kind: Namespace
metadata:
  name: ls-data-cloudops-test
  labels:
    platform: turbo
    tier: data

