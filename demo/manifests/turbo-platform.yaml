# Turbo Platform — Realistic service landscape for KIRA demos
# Mirrors the real Lightsaber/Turbo environment with dummy images.
# Multi-container pods on key services (sidecars: fluent-bit, config-reloader,
# auth-proxy, metrics-exporter).
