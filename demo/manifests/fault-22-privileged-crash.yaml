# Test 22: Privileged container with bad command — tests security agent flagging
# Expected: rollback (crash + security concern)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cart-web
  namespace: ls-pricing-cloudops-test
  labels:
    app: cart-web
    version: fault-privileged-crash
  annotations:
    kubernetes.io/change-cause: "FAULT: privileged container with crash loop"
spec:
  serviceName: cart-web
  replicas: 3
  selector:
    matchLabels:
      app: cart-web
  template:
    metadata:
      labels:
        app: cart-web
    spec:
      containers:
        - name: cart-web
          image: busybox:1.36
          command: ["sh", "-c", "echo 'ERROR: failed to bind privileged port' && exit 1"]
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
