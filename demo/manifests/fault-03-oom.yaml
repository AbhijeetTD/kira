# Test 3: OOMKilled — memory limit so low the container gets killed → patch memory
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cart-web
  namespace: ls-pricing-cloudops-test
  labels:
    app: cart-web
    version: fault-oom
  annotations:
    kubernetes.io/change-cause: "FAULT: 4Mi memory limit — will OOMKill"
spec:
  serviceName: cart-web
  replicas: 3
  selector:
    matchLabels:
      app: cart-web
  template:
    metadata:
      labels:
        app: cart-web
    spec:
      containers:
        - name: cart-web
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "4Mi"
            limits:
              cpu: "500m"
              memory: "4Mi"
