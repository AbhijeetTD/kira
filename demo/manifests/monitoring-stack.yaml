# ─────────────────────────────────────────────────────────────────────────────
# KIRA Monitoring Stack — Prometheus + Grafana
# Watches all services across namespaces and fires alerts to KIRA.
# ─────────────────────────────────────────────────────────────────────────────

---
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app: kira-monitoring

# ═══════════════════════════════════════════════════════════════════════════════
# Prometheus — lightweight, scrapes kube-state-metrics for pod health
# ═══════════════════════════════════════════════════════════════════════════════

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: monitoring

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources: [nodes, nodes/metrics, services, endpoints, pods]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get]
  - apiGroups: [extensions, networking.k8s.io]
    resources: [ingresses]
    verbs: [get, list, watch]
  - nonResourceURLs: [/metrics]
    verbs: [get]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: monitoring
roleRef:
  kind: ClusterRole
  name: prometheus
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      # Scrape kubelet cAdvisor for container metrics
      - job_name: 'kubelet'
        scheme: https
        tls_config:
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor

      # Scrape kube-state-metrics
      - job_name: 'kube-state-metrics'
        static_configs:
          - targets: ['kube-state-metrics.monitoring.svc:8080']

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.retention.time=2h
            - --web.enable-lifecycle
          ports:
            - containerPort: 9090
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits:   { cpu: "200m", memory: "256Mi" }
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config

---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: monitoring
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090

# ═══════════════════════════════════════════════════════════════════════════════
# kube-state-metrics — exposes pod restart counts, OOMKilled, phase, etc.
# ═══════════════════════════════════════════════════════════════════════════════

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kube-state-metrics
  namespace: monitoring

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kube-state-metrics
rules:
  - apiGroups: [""]
    resources: [configmaps, secrets, nodes, pods, services, resourcequotas,
                replicationcontrollers, limitranges, persistentvolumeclaims,
                persistentvolumes, namespaces, endpoints]
    verbs: [list, watch]
  - apiGroups: [apps]
    resources: [statefulsets, daemonsets, deployments, replicasets]
    verbs: [list, watch]
  - apiGroups: [batch]
    resources: [cronjobs, jobs]
    verbs: [list, watch]
  - apiGroups: [autoscaling]
    resources: [horizontalpodautoscalers]
    verbs: [list, watch]
  - apiGroups: [authentication.k8s.io]
    resources: [tokenreviews]
    verbs: [create]
  - apiGroups: [authorization.k8s.io]
    resources: [subjectaccessreviews]
    verbs: [create]
  - apiGroups: [policy]
    resources: [poddisruptionbudgets]
    verbs: [list, watch]
  - apiGroups: [certificates.k8s.io]
    resources: [certificatesigningrequests]
    verbs: [list, watch]
  - apiGroups: [storage.k8s.io]
    resources: [storageclasses, volumeattachments]
    verbs: [list, watch]
  - apiGroups: [networking.k8s.io]
    resources: [networkpolicies, ingresses]
    verbs: [list, watch]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-state-metrics
subjects:
  - kind: ServiceAccount
    name: kube-state-metrics
    namespace: monitoring
roleRef:
  kind: ClusterRole
  name: kube-state-metrics
  apiGroup: rbac.authorization.k8s.io

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kube-state-metrics
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kube-state-metrics
  template:
    metadata:
      labels:
        app: kube-state-metrics
    spec:
      serviceAccountName: kube-state-metrics
      containers:
        - name: kube-state-metrics
          image: registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.12.0
          ports:
            - containerPort: 8080
            - containerPort: 8081
          resources:
            requests: { cpu: "10m", memory: "64Mi" }
            limits:   { cpu: "100m", memory: "128Mi" }

---
apiVersion: v1
kind: Service
metadata:
  name: kube-state-metrics
  namespace: monitoring
spec:
  selector:
    app: kube-state-metrics
  ports:
    - name: http-metrics
      port: 8080
      targetPort: 8080
    - name: telemetry
      port: 8081
      targetPort: 8081

# ═══════════════════════════════════════════════════════════════════════════════
# Grafana — with provisioned datasource, alert rules, and webhook contact point
# ═══════════════════════════════════════════════════════════════════════════════

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc:9090
        isDefault: true
        editable: true

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-alerting
  namespace: monitoring
data:
  contact-points.yaml: |
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: KIRA
        receivers:
          - uid: kira-webhook
            type: webhook
            settings:
              url: "http://host.docker.internal:8000/webhook/grafana"
              httpMethod: POST
            disableResolveMessage: false

  notification-policies.yaml: |
    apiVersion: 1
    policies:
      - orgId: 1
        receiver: KIRA
        group_by: ['namespace', 'alertname', 'pod']
        group_wait: 10s
        group_interval: 30s
        repeat_interval: 4h

  alert-rules.yaml: |
    apiVersion: 1
    groups:
      - orgId: 1
        name: KIRA — Pod Health
        folder: KIRA
        interval: 30s
        rules:
          # ── OOMKilled detection ──────────────────────────────────────────
          - uid: ks-oomkilled
            title: "OOMKilled Restart"
            condition: C
            data:
              - refId: A
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: PBFA97CFB590B2093
                model:
                  expr: |
                    increase(kube_pod_container_status_restarts_total[5m]) > 0
                    and on(pod, namespace)
                    kube_pod_container_status_last_terminated_reason{reason="OOMKilled"}
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator: { type: gt, params: [0] }
                  refId: C
            for: 0s
            noDataState: OK
            labels:
              severity: warning
              alertSource: Grafana
            annotations:
              summary: >-
                Pod {{ $labels.pod }} in {{ $labels.namespace }} was OOMKilled
                and restarted. Memory limits may need adjustment.

          # ── CrashLoopBackOff detection ───────────────────────────────────
          - uid: ks-crashloop
            title: "CrashLoopBackOff"
            condition: C
            data:
              - refId: A
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: PBFA97CFB590B2093
                model:
                  expr: |
                    kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff"} > 0
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator: { type: gt, params: [0] }
                  refId: C
            for: 10s
            noDataState: OK
            labels:
              severity: critical
              alertSource: Grafana
            annotations:
              summary: >-
                Pod {{ $labels.pod }} in {{ $labels.namespace }} is in
                CrashLoopBackOff. Container is repeatedly crashing.

          # ── Pod Not Ready ────────────────────────────────────────────────
          - uid: ks-pod-not-ready
            title: "Pod Not Ready"
            condition: C
            data:
              - refId: A
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: PBFA97CFB590B2093
                model:
                  expr: |
                    kube_pod_status_ready{condition="true"} == 0
                    and on(pod, namespace)
                    kube_pod_status_phase{phase="Running"} == 1
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator: { type: gt, params: [0] }
                  refId: C
            for: 10s
            noDataState: OK
            labels:
              severity: warning
              alertSource: Grafana
            annotations:
              summary: >-
                Pod {{ $labels.pod }} in {{ $labels.namespace }} is running
                but not ready for over 30 seconds. Health probes may be failing.

          # ── High Restart Count ───────────────────────────────────────────
          - uid: ks-high-restarts
            title: "High Restart Count"
            condition: C
            data:
              - refId: A
                relativeTimeRange: { from: 3600, to: 0 }
                datasourceUid: PBFA97CFB590B2093
                model:
                  expr: |
                    increase(kube_pod_container_status_restarts_total[1h]) > 3
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange: { from: 3600, to: 0 }
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange: { from: 3600, to: 0 }
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator: { type: gt, params: [0] }
                  refId: C
            for: 10s
            noDataState: OK
            labels:
              severity: warning
              alertSource: Grafana
            annotations:
              summary: >-
                Pod {{ $labels.pod }} in {{ $labels.namespace }} has restarted
                more than 3 times in the last hour.

          # ── Stuck in ContainerCreating (sandbox OOM / image pull) ────────
          - uid: ks-container-creating
            title: "Stuck ContainerCreating (Sandbox OOM)"
            condition: C
            data:
              - refId: A
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: PBFA97CFB590B2093
                model:
                  expr: |
                    kube_pod_container_status_waiting_reason{reason="ContainerCreating"} > 0
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator: { type: gt, params: [0] }
                  refId: C
            for: 10s
            noDataState: OK
            labels:
              severity: critical
              alertSource: Grafana
            annotations:
              summary: >-
                Pod {{ $labels.pod }} in {{ $labels.namespace }} is stuck in
                ContainerCreating for over 30 seconds. Likely sandbox OOM-killed
                due to memory limits too low, or image pull failure.

          # ── CreateContainerError ─────────────────────────────────────────
          - uid: ks-create-container-error
            title: "CreateContainerError"
            condition: C
            data:
              - refId: A
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: PBFA97CFB590B2093
                model:
                  expr: |
                    kube_pod_container_status_waiting_reason{reason="CreateContainerError"} > 0
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator: { type: gt, params: [0] }
                  refId: C
            for: 10s
            noDataState: OK
            labels:
              severity: critical
              alertSource: Grafana
            annotations:
              summary: >-
                Pod {{ $labels.pod }} in {{ $labels.namespace }} failed to
                create container. Check resource limits, image, and config.

          # ── ImagePullBackOff ─────────────────────────────────────────────
          - uid: ks-image-pull-backoff
            title: "ImagePullBackOff"
            condition: C
            data:
              - refId: A
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: PBFA97CFB590B2093
                model:
                  expr: |
                    kube_pod_container_status_waiting_reason{reason=~"ImagePullBackOff|ErrImagePull"} > 0
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator: { type: gt, params: [0] }
                  refId: C
            for: 0s
            noDataState: OK
            labels:
              severity: warning
              alertSource: Grafana
            annotations:
              summary: >-
                Pod {{ $labels.pod }} in {{ $labels.namespace }} cannot pull
                its container image. Check image name, tag, and registry access.

          # ── Pending Pod (unschedulable) ──────────────────────────────────
          - uid: ks-pod-pending
            title: "Pod Stuck Pending"
            condition: C
            data:
              - refId: A
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: PBFA97CFB590B2093
                model:
                  expr: |
                    kube_pod_status_phase{phase="Pending"} == 1
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator: { type: gt, params: [0] }
                  refId: C
            for: 10s
            noDataState: OK
            labels:
              severity: warning
              alertSource: Grafana
            annotations:
              summary: >-
                Pod {{ $labels.pod }} in {{ $labels.namespace }} has been
                Pending for over 30 seconds. Likely insufficient resources or
                scheduling constraints (taints, affinity, PVC binding).

          # ── Deployment Replicas Mismatch (rollout stuck) ─────────────────
          - uid: ks-deployment-mismatch
            title: "Deployment Replicas Mismatch"
            condition: C
            data:
              - refId: A
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: PBFA97CFB590B2093
                model:
                  expr: |
                    kube_deployment_spec_replicas
                    != kube_deployment_status_replicas_available
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator: { type: gt, params: [0] }
                  refId: C
            for: 10s
            noDataState: OK
            labels:
              severity: warning
              alertSource: Grafana
            annotations:
              summary: >-
                Deployment {{ $labels.deployment }} in {{ $labels.namespace }}
                has desired replicas != available for over 30 seconds.
                Rollout may be stuck or pods are failing to become ready.

          # ── StatefulSet Replicas Mismatch ────────────────────────────────
          - uid: ks-statefulset-mismatch
            title: "StatefulSet Replicas Mismatch"
            condition: C
            data:
              - refId: A
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: PBFA97CFB590B2093
                model:
                  expr: |
                    kube_statefulset_replicas
                    != kube_statefulset_status_replicas_ready
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange: { from: 600, to: 0 }
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator: { type: gt, params: [0] }
                  refId: C
            for: 10s
            noDataState: OK
            labels:
              severity: warning
              alertSource: Grafana
            annotations:
              summary: >-
                StatefulSet {{ $labels.statefulset }} in {{ $labels.namespace }}
                has desired replicas != ready for over 30 seconds.

          # ── Pod Evicted ──────────────────────────────────────────────────
          - uid: ks-pod-evicted
            title: "Pod Evicted"
            condition: C
            data:
              - refId: A
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: PBFA97CFB590B2093
                model:
                  expr: |
                    kube_pod_status_phase{phase="Failed"}
                    * on(pod, namespace)
                    group_left kube_pod_status_reason{reason="Evicted"} > 0
                  instant: true
                  refId: A
              - refId: B
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: __expr__
                model:
                  type: reduce
                  expression: A
                  reducer: last
                  refId: B
              - refId: C
                relativeTimeRange: { from: 300, to: 0 }
                datasourceUid: __expr__
                model:
                  type: threshold
                  expression: B
                  conditions:
                    - evaluator: { type: gt, params: [0] }
                  refId: C
            for: 10s
            noDataState: OK
            labels:
              severity: warning
              alertSource: Grafana
            annotations:
              summary: >-
                Pod {{ $labels.pod }} in {{ $labels.namespace }} was evicted.
                Node may be under disk or memory pressure.

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provisioning
  namespace: monitoring
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: "KIRA"
        type: file
        disableDeletion: false
        editable: true
        updateIntervalSeconds: 10
        allowUiUpdates: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-json
  namespace: monitoring
data:
  kira-services.json: |
    {
        "id": null,
        "uid": "kira-services",
        "title": "KIRA \u2014 Service Health",
        "tags": ["kira", "turbo", "services"],
        "timezone": "browser",
        "refresh": "30s",
        "time": { "from": "now-1h", "to": "now" },
        "templating": {
          "list": [
            {
              "name": "namespace",
              "type": "query",
              "datasource": { "uid": "PBFA97CFB590B2093" },
              "query": "label_values(kube_pod_info, namespace)",
              "refresh": 2,
              "includeAll": true,
              "multi": true,
              "current": { "text": "All", "value": "$__all" }
            }
          ]
        },
        "panels": [
          {
            "id": 1,
            "title": "Pods by Status",
            "type": "stat",
            "gridPos": { "h": 4, "w": 5, "x": 0, "y": 0 },
            "datasource": { "uid": "PBFA97CFB590B2093" },
            "targets": [
              { "expr": "count(kube_pod_status_phase{namespace=~\"$namespace\", phase=\"Running\"} == 1)", "legendFormat": "Running", "refId": "A" }
            ],
            "fieldConfig": { "defaults": { "color": { "mode": "fixed", "fixedColor": "green" }, "thresholds": { "steps": [{"value": null, "color": "green"}] } } }
          },
          {
            "id": 2,
            "title": "Pods Not Ready",
            "type": "stat",
            "gridPos": { "h": 4, "w": 5, "x": 5, "y": 0 },
            "datasource": { "uid": "PBFA97CFB590B2093" },
            "targets": [
              { "expr": "count(kube_pod_status_ready{namespace=~\"$namespace\", condition=\"true\"} == 0 and on(pod,namespace) kube_pod_status_phase{phase=\"Running\"} == 1) or vector(0)", "legendFormat": "Not Ready", "refId": "A" }
            ],
            "fieldConfig": { "defaults": { "color": { "mode": "fixed", "fixedColor": "orange" }, "thresholds": { "steps": [{"value": null, "color": "green"}, {"value": 1, "color": "orange"}, {"value": 3, "color": "red"}] } } }
          },
          {
            "id": 3,
            "title": "CrashLoopBackOff",
            "type": "stat",
            "gridPos": { "h": 4, "w": 5, "x": 10, "y": 0 },
            "datasource": { "uid": "PBFA97CFB590B2093" },
            "targets": [
              { "expr": "count(kube_pod_container_status_waiting_reason{namespace=~\"$namespace\", reason=\"CrashLoopBackOff\"} > 0) or vector(0)", "legendFormat": "CrashLoop", "refId": "A" }
            ],
            "fieldConfig": { "defaults": { "color": { "mode": "fixed", "fixedColor": "red" }, "thresholds": { "steps": [{"value": null, "color": "green"}, {"value": 1, "color": "red"}] } } }
          },
          {
            "id": 4,
            "title": "OOMKilled (last 1h)",
            "type": "stat",
