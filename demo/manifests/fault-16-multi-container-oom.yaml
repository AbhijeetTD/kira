# Test 16: Memory limit too low for multi-container pod — both containers undersized
# Expected: patch (memory increase)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cart-web
  namespace: ls-pricing-cloudops-test
  labels:
    app: cart-web
    version: fault-multi-oom
  annotations:
    kubernetes.io/change-cause: "FAULT: both containers have 4Mi memory limit"
spec:
  serviceName: cart-web
  replicas: 3
  selector:
    matchLabels:
      app: cart-web
  template:
    metadata:
      labels:
        app: cart-web
    spec:
      containers:
        - name: cart-web
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "2Mi"
            limits:
              cpu: "500m"
              memory: "4Mi"
        - name: metrics
          image: nginx:1.25-alpine
          command: ["sh", "-c", "while true; do sleep 30; done"]
          resources:
            requests:
              cpu: "50m"
              memory: "2Mi"
            limits:
              cpu: "100m"
              memory: "4Mi"
