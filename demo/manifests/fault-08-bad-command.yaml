# Test 8: Wrong container command overriding nginx entrypoint → CrashLoop → rollback
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cart-web
  namespace: ls-pricing-cloudops-test
  labels:
    app: cart-web
    version: fault-bad-command
  annotations:
    kubernetes.io/change-cause: "FAULT: wrong entrypoint overrides nginx"
spec:
  serviceName: cart-web
  replicas: 3
  selector:
    matchLabels:
      app: cart-web
  template:
    metadata:
      labels:
        app: cart-web
    spec:
      containers:
        - name: cart-web
          image: nginx:1.25-alpine
          command: ["/bin/sh", "-c", "cat /etc/app/missing-config.yaml"]
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
