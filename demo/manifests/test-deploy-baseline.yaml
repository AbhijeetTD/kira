# Baseline: healthy Deployment for testing non-StatefulSet scenarios
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-api
  namespace: ls-pricing-cloudops-test
  labels:
    app: test-api
    version: v1-healthy
  annotations:
    kubernetes.io/change-cause: "baseline — healthy deployment (nginx:1.25-alpine)"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-api
  template:
    metadata:
      labels:
        app: test-api
    spec:
      containers:
        - name: test-api
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
