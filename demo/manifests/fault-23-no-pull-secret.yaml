# Test 23: Image pull from private registry without imagePullSecret
# Expected: rollback (ImagePullBackOff, auth required)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cart-web
  namespace: ls-pricing-cloudops-test
  labels:
    app: cart-web
    version: fault-no-pull-secret
  annotations:
    kubernetes.io/change-cause: "FAULT: private registry image without imagePullSecrets"
spec:
  serviceName: cart-web
  replicas: 3
  selector:
    matchLabels:
      app: cart-web
  template:
    metadata:
      labels:
        app: cart-web
    spec:
      containers:
        - name: cart-web
          image: ghcr.io/private-org/nonexistent-app:v1.0.0
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
