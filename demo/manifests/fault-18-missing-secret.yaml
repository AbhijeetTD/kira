# Test 18: Missing Secret volume mount — pod can't start
# Expected: none or rollback (missing secret is external config issue)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cart-web
  namespace: ls-pricing-cloudops-test
  labels:
    app: cart-web
    version: fault-missing-secret
  annotations:
    kubernetes.io/change-cause: "FAULT: references non-existent secret volume"
spec:
  serviceName: cart-web
  replicas: 3
  selector:
    matchLabels:
      app: cart-web
  template:
    metadata:
      labels:
        app: cart-web
    spec:
      containers:
        - name: cart-web
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: tls-certs
              mountPath: /etc/tls
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
      volumes:
        - name: tls-certs
          secret:
            secretName: nonexistent-tls-secret-xyz
