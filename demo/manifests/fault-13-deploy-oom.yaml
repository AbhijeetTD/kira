# Test 13: Deployment OOMKilled — tests patch on Deployment kind
# Expected: patch (increase memory)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-api
  namespace: ls-pricing-cloudops-test
  labels:
    app: test-api
    version: fault-deploy-oom
  annotations:
    kubernetes.io/change-cause: "FAULT: 4Mi memory limit on Deployment — OOMKill"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-api
  template:
    metadata:
      labels:
        app: test-api
    spec:
      containers:
        - name: test-api
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "2Mi"
            limits:
              cpu: "500m"
              memory: "4Mi"
